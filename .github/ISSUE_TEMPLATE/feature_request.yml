name: Feature request
description: Suggest an AgentDesk feature
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should AgentDesk solve?
      placeholder: "When I use ChatGPT with local Windows projects, I want..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Windows diagnostics
        - Docker diagnostics
        - Codex/MCP repair
        - Browser/local page checks
        - Skill Packs
        - Plugin system
        - Security
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Could this feature read sensitive data, mutate files, stop processes, or change global machine state?
