name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      DEVSPACE_ALLOWED_ROOTS: ${{ github.workspace }}
      DEVSPACE_OAUTH_OWNER_TOKEN: ci-owner-token-that-is-long-enough
      DEVSPACE_PUBLIC_BASE_URL: http://127.0.0.1:7676
      DEVSPACE_PERMISSION_PROFILE: power
      DEVSPACE_SYSTEM_TOOLS: "1"
      DEVSPACE_PROCESS_CONTROL: "0"
      DEVSPACE_BROWSER_TOOLS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Focused AgentDesk tests
        run: npx tsx src/config.test.ts && npx tsx src/plugins.test.ts && npx tsx src/system-tools.test.ts && npx tsx src/browser-tools.test.ts

      - name: Build
        run: npm run build

      - name: Doctor
        run: node dist/cli.js doctor
